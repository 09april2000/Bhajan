<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tail Ardas Kirtan - Shyam & Krishna Bhajans</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="./script.js"></script>

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #fdfbf7 0%, #f5efe6 100%);
      }
      .hindi-font {
        font-family: "Noto Sans Devanagari", sans-serif;
      }

      /* Smooth Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #f5efe6;
      }
      ::-webkit-scrollbar-thumb {
        background: #c5a880;
        border-radius: 4px;
      }
     /* Apply to every element on the page */
*, *::before, *::after {
    -webkit-user-select: none !important; /* Safari */
    -moz-user-select: none !important;    /* Firefox */
    -ms-user-select: none !important;     /* IE/Edge */
    user-select: none !important;         /* Standard */
}
header{
  background-image: url('https://09april2000.github.io/Bhajan/bg.png');
  background-repeat: no-repeat;
  background-size: cover;
}
    </style>
  </head>
  <body class="text-stone-800 min-h-screen flex flex-col antialiased">
    <!-- PREMIUM HEADER (Peacock Teal & Gold Theme) -->
    <header
      class="relative bg-gradient-to-br from-purple-950 via-blue-900 to-pink-950 text-white py-16 px-4 shadow-xl text-center overflow-hidden border-b-2 border-amber-400/20"
    >
      <!-- Spiritual Mandala/Geometric Background Overlay >
      <div
        class="absolute inset-0 opacity-10 bg-[radial-gradient(#fff_1.5px,transparent_1.5px)] [background-size:24px_24px]"
      ></div>
      <div
        class="absolute -left-20 -top-20 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"
      ></div>
      <div
        class="absolute -right-20 -bottom-20 w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"
      ></div-->

      <div class="relative z-10 max-w-4xl mx-auto">
        <span
          class="text-xs font-semibold tracking-widest text-blue-400 uppercase bg-black/50 px-4 py-1.5 rounded-full border border-amber-400/20"
          >• Jai Shree Shyam •</span
        >
        <h1
          class="text-4xl [-webkit-text-stroke:_1px_black] md:text-5xl font-bold tracking-wide drop-shadow-md text-white-800 mt-4"
        >
          Tali Ardas Kirtan
        </h1>
        <p
          class="text-stone-300 mt-3 text-sm md:text-base tracking-wide max-w-xl mx-auto font-light"
        ></p>

        <!-- MODERN SEARCH BAR -->
        <div class="mt-10 max-w-md mx-auto">
          <div class="relative group">
            <input
              type="text"
              id="searchInput"
              oninput="searchBhajans()"
              placeholder="Search bhajans, lyrics, or keywords..."
              class="w-full px-6 py-3.5 pl-12 rounded-xl text-stone-800 bg-white shadow-lg focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all duration-300 border border-stone-200/80"
            />
            <span
              class="absolute left-4 top-4 text-stone-400 group-focus-within:text-amber-600 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.603 10.602Z"
                />
              </svg>
            </span>
          </div>
        </div>
      </div>
    </header>
    <main class="flex-grow max-w-6xl w-full mx-auto px-6 py-12">
      <div
        id="homePage"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      ></div>
      <div
        id="detailPage"
        class="hidden max-w-3xl mx-auto bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl border border-stone-200/60 p-6 md:p-12 transition-all duration-500"
      >
        <button
          onclick="showHomePage()"
          class="mb-8 inline-flex items-center gap-2 text-teal-800 hover:text-amber-600 font-medium cursor-pointer transition-colors group"
        >
          <span
            class="transform group-hover:-translate-x-1 transition-transform"
            >←</span
          >
          Back to Home
        </button>
        <div id="bhajanFullContent"></div>
      </div>
    </main>
    <footer
      class="bg-stone-950 text-stone-500 py-8 text-center text-sm border-t border-stone-900"
    >
      <p class="text-stone-400 tracking-widest font-medium">
        TALI ARDAS KIRTAN
      </p>
    </footer>

</body>
</html>
